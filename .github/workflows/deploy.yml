name: Deploy to Bluehost via FTP

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual run from the Actions tab

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          # This FTP account is scoped to its own home folder
          # (public_html/visionhill), so on login it lands directly inside it.
          server-dir: ./
          # exclude must be a multiline string, NOT a YAML list.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.DS_Store
            README.md
