name: Deploy to Bluehost via FTP

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual run from the Actions tab

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          # This FTP account (visionhill@...) is scoped to its own home folder
          # (public_html/visionhill), so on login it lands directly inside it.
          # Upload to the login root — do NOT prefix public_html/ again.
          server-dir: ./
          protocol: ftp
          port: 21
          # Upload everything in the repo except the items below.
          exclude:
            - "**/.git*"
            - "**/.git*/**"
            - "**/.github/**"
            - "**/.DS_Store"
            - "README.md"
