<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vision Hill</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #2b2b2b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .pdf-frame {
      border: none;
      width: 100%;
      height: 100vh;
      display: block;
    }

    .fallback {
      color: #fff;
      text-align: center;
      padding: 40px 20px;
    }

    .fallback a {
      color: #4ea1ff;
    }
  </style>
</head>
<body>
  <!-- The PDF loads automatically when the page opens -->
  <object class="pdf-frame" data="Vision%20Hill.pdf" type="application/pdf">
    <iframe class="pdf-frame" src="Vision%20Hill.pdf"></iframe>
    <div class="fallback">
      <p>Your browser can't display the PDF inline.</p>
      <p><a href="Vision%20Hill.pdf">Click here to open Vision Hill.pdf</a></p>
    </div>
  </object>
</body>
</html>
